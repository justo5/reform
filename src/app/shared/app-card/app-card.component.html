@if (app().available) {
  <a class="card" [routerLink]="app().route" aria-label="Abrir {{ app().name }}">
    @if (app().icon) {
      <span class="card-icon">{{ app().icon }}</span>
    }
    <span class="card-name">{{ app().name }}</span>
    <span class="card-desc">{{ app().description }}</span>
    <span class="card-arrow">→</span>
  </a>
} @else {
  <div class="card card--disabled" aria-disabled="true">
    @if (app().icon) {
      <span class="card-icon">{{ app().icon }}</span>
    }
    <span class="card-name">{{ app().name }}</span>
    <span class="card-desc">{{ app().description }}</span>
    <span class="card-badge">próximamente</span>
  </div>
}
