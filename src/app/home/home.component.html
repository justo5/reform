<div class="home">
  <header class="home-header">
    <div class="brand">
      <img src="logosinfondo_opt.webp" alt="Vamos Bien logo" class="brand-logo" />
      <h1 class="greeting">Herramientas <br> <span class="accent">Vamos Bien</span></h1>
    </div>
    <p class="subtitle">Elige una herramienta para empezar</p>
  </header>

  <main class="grid" aria-label="Aplicaciones disponibles">
    @for (app of apps; track app.id) {
      <app-card [app]="app" />
    }
  </main>
</div>
